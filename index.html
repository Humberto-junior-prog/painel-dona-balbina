<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Produção - Dona Balbina</title>
    <style>
        /* =========================================
           1. ESTILOS GERAIS (CSS)
           ========================================= */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
            box-sizing: border-box;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 {
            margin: 0 0 10px 0;
            color: #222;
            font-size: 28px;
            text-transform: uppercase;
        }
        .data-atual {
            color: #666;
            font-size: 18px;
            text-transform: capitalize;
            margin-bottom: 15px;
        }

        .indicador-turno {
            display: inline-block;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.3s; 
        }
        .indicador-turno.manha { background-color: #FF8C00; } 
        .indicador-turno.tarde { background-color: #4B0082; } 

        /* =========================================
           2. ESTRUTURA DA TABELA UNIFICADA
           ========================================= */
        .container-tabela {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden; 
        }

        table.producao {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; 
        }

        table.producao th.col-produto { width: 30%; text-align: left; }
        table.producao th.col-meta { width: 15%; text-align: center; }
        table.producao th.col-acao { width: 35%; text-align: center; }
        table.producao th.col-separar { width: 20%; text-align: center; }

        table.producao th {
            padding: 15px;
            font-size: 16px;
            color: #444;
        }

        table.producao th.header-agora {
            background-color: #FF8C00; 
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background-color 0.3s; 
        }
        table.producao th.header-depois {
            background-color: #007BFF; 
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        table.producao th.col-separar, 
        table.producao td.col-separar {
            border-left: 5px solid #333; 
        }

        table.producao tbody tr {
            border-bottom: 1px solid #eee;
            transition: background-color 0.2s;
        }
        table.producao td {
            padding: 15px;
            font-size: 18px;
        }

        table.producao td.col-acao { background-color: #FFFAEE; } 
        table.producao td.col-separar { background-color: #F0F8FF; } 

        .nome-produto {
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }

        table.producao tr.concluido { background-color: #d4edda; }
        table.producao tr.concluido .nome-produto { text-decoration: line-through; color: #155724; }

        .qtd-meta { font-weight: bold; color: #007BFF; font-size: 20px; }
        .texto-zero { color: #aaa; font-style: italic; font-size: 16px; }

        /* =========================================
           3. BOTÃO DE AÇÃO
           ========================================= */
        .btn-acao {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background-color: #007BFF; 
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-acao:active { transform: scale(0.95); }
        .btn-acao.concluido { background-color: #28a745; }
        .btn-acao.desfazer { background-color: #6c757d; }

        .footer { text-align: center; margin-top: 30px; padding: 20px 0; }
        .btn-reset {
            background-color: #dc3545; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PRODUÇÃO DONA BALBINA</h1>
        <div class="data-atual" id="data-display"></div>
        <div id="indicador-turno" class="indicador-turno">Calculando turno...</div>
    </div>

    <div class="container-tabela">
        <table class="producao">
            <thead>
                <tr>
                    <th colspan="1" class="col-produto"></th>
                    <th colspan="2" class="header-agora" id="titulo-operacao">🔥 OPERAÇÃO DO TURNO</th>
                    <th colspan="1" class="header-depois col-separar" id="titulo-preparacao">❄️ PREPARAÇÃO</th>
                </tr>
                <tr>
                    <th class="col-produto">PRODUTO</th>
                    <th class="col-meta">Meta (Assar)</th>
                    <th class="col-acao">AÇÃO (Assar Agora) 👈 Clique</th>
                    <th class="col-separar">Separar para Freezer</th>
                </tr>
            </thead>
            <tbody id="lista-producao">
                </tbody>
        </table>
    </div>

    <div class="footer">
        <button class="btn-reset" onclick="resetarChecklist()">Resetar Checklist do Turno Atual</button>
    </div>

    <script>
        let turnoAtual = ''; 
        let hoje = new Date();

        /* DADOS DA PLANILHA (19 Produtos) 
           Formato: [Dom(0), Seg(1), Ter(2), Qua(3), Qui(4), Sex(5), Sab(6)] 
           Onde havia 'X' na planilha, está como 0 */
        const produtos = [
            { id: 1, nome: "Baguete Parmesão", metasManha: [15, 8, 15, 8, 15, 28, 28], metasTarde: [0, 15, 30, 15, 30, 30, 0] },
            { id: 2, nome: "Baguete Provolone", metasManha: [0, 8, 15, 8, 15, 28, 28], metasTarde: [0, 15, 30, 15, 30, 30, 0] },
            { id: 3, nome: "Baguete Gergelim", metasManha: [0, 5, 5, 5, 5, 5, 5], metasTarde: [0, 0, 0, 0, 0, 0, 0] },
            { id: 4, nome: "Cervejinha", metasManha: [0, 8, 8, 8, 8, 8, 8], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 5, nome: "Pão de Batata", metasManha: [8, 8, 8, 8, 8, 8, 8], metasTarde: [0, 8, 8, 8, 8, 8, 0] },
            { id: 6, nome: "Brioche", metasManha: [0, 8, 8, 8, 8, 8, 8], metasTarde: [0, 16, 16, 16, 16, 16, 0] },
            { id: 7, nome: "Broa de Milho", metasManha: [0, 8, 8, 8, 8, 8, 16], metasTarde: [0, 8, 8, 8, 8, 8, 0] },
            { id: 8, nome: "Pão Francês Integral", metasManha: [15, 15, 15, 15, 15, 15, 15], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 9, nome: "Pão Mini Hot Dog", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 10, nome: "Pão Suíço", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 11, nome: "Pão Suíço s/ Açúcar", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 12, nome: "Pão Doce Simples", metasManha: [15, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 13, nome: "Pão Doce Coco", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 14, nome: "Pão Doce c/ Doce de Leite", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 15, nome: "Pão Doce c/ Goiabada", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 16, nome: "Assado Salsicha", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 17, nome: "Assado Frango", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 18, nome: "Assado Presunto", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] },
            { id: 19, nome: "Assado Mortadela", metasManha: [0, 15, 15, 15, 15, 15, 30], metasTarde: [0, 15, 15, 15, 15, 15, 0] }
        ];

        /* MEMÓRIA DE CHECKLIST EXTENDIDA PARA 19 ITENS */
        const checklist = {
            'manha': {},
            'tarde': {}
        };
        for(let i=1; i<=19; i++) {
            checklist['manha'][`id_${i}`] = false;
            checklist['tarde'][`id_${i}`] = false;
        }

        function exibirData() {
            const display = document.getElementById('data-display');
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            display.textContent = hoje.toLocaleDateString('pt-BR', opcoes);
        }

        /* O "CÉREBRO" DO HORÁRIO E DO TURNO */
        function verificarHorarioETurno() {
            const hora = hoje.getHours();
            const minuto = hoje.getMinutes();
            let turnoCalculado = 'manha'; 

            // Regra da TARDE: Entre 14:30 e 22:59
            if ((hora === 14 && minuto >= 30) || (hora > 14 && hora < 23)) {
                turnoCalculado = 'tarde';
            } else {
                turnoCalculado = 'manha';
            }

            if (turnoAtual !== turnoCalculado) {
                turnoAtual = turnoCalculado;
                atualizarSeloVisual();
                renderizarTelas();
            }
        }

        function atualizarSeloVisual() {
            const indicador = document.getElementById('indicador-turno');
            if (turnoAtual === 'manha') {
                indicador.textContent = 'Turno: MANHÃ';
                indicador.className = 'indicador-turno manha';
            } else {
                indicador.textContent = 'Turno: TARDE';
                indicador.className = 'indicador-turno tarde';
            }
        }

        function renderizarTelas() {
            const container = document.getElementById('lista-producao');
            container.innerHTML = ''; 

            const tituloOperacao = document.getElementById('titulo-operacao');
            const tituloPreparacao = document.getElementById('titulo-preparacao');

            const diaAtual = hoje.getDay(); // 0: Dom, 1: Seg... 6: Sáb
            const diaSeguinte = (diaAtual + 1) % 7; 

            /* LÓGICA DO PULO DE TURNO (LOOK-AHEAD) PARA FINAIS DE SEMANA */
            let diaPreparacao = diaAtual;
            let turnoPreparacao = 'tarde';
            let tituloTelhadoAzul = '❄️ PREPARAÇÃO (TARDE)';

            if (turnoAtual === 'manha') {
                tituloOperacao.textContent = '🔥 OPERAÇÃO DO TURNO (MANHÃ)';
                tituloOperacao.style.backgroundColor = '#FF8C00'; 
                
                // Exceções do Final de Semana
                if (diaAtual === 6) { // Se for Sábado de Manhã
                    diaPreparacao = 0; // Pula para mostrar a Manhã de Domingo
                    turnoPreparacao = 'manha';
                    tituloTelhadoAzul = '❄️ PREPARAR P/ DOMINGO (MANHÃ)';
                } else if (diaAtual === 0) { // Se for Domingo de Manhã
                    diaPreparacao = 1; // Pula para mostrar a Manhã de Segunda
                    turnoPreparacao = 'manha';
                    tituloTelhadoAzul = '❄️ PREPARAR P/ SEGUNDA (MANHÃ)';
                } else {
                    diaPreparacao = diaAtual;
                    turnoPreparacao = 'tarde';
                    tituloTelhadoAzul = '❄️ PREPARAR P/ HOJE (TARDE)';
                }

            } else {
                tituloOperacao.textContent = '🔥 OPERAÇÃO DO TURNO (TARDE)';
                tituloOperacao.style.backgroundColor = '#4B0082'; 
                
                // À tarde, sempre prepara a manhã do dia seguinte
                diaPreparacao = diaSeguinte;
                turnoPreparacao = 'manha';
                tituloTelhadoAzul = '❄️ PREPARAR P/ AMANHÃ (MANHÃ)';
            }

            // Atualiza o texto do telhado azul
            tituloPreparacao.textContent = tituloTelhadoAzul;

            produtos.forEach((produto) => {
                let metaAssar = 0;
                let metaSeparar = 0;
                const statusFeito = checklist[turnoAtual][`id_${produto.id}`];

                // Puxa o que tem que assar AGORA
                if (turnoAtual === 'manha') {
                    metaAssar = produto.metasManha[diaAtual]; 
                } else {
                    metaAssar = produto.metasTarde[diaAtual]; 
                }

                // Puxa o que tem que separar usando o guarda de trânsito (Pulo de turno)
                if (turnoPreparacao === 'manha') {
                    metaSeparar = produto.metasManha[diaPreparacao];
                } else {
                    metaSeparar = produto.metasTarde[diaPreparacao];
                }

                // Esconder produtos que são 0 tanto para assar quanto para separar (Limpa a tela!)
                if (metaAssar === 0 && metaSeparar === 0) {
                    return; // Pula este produto e vai para o próximo
                }

                const tr = document.createElement('tr');
                if (statusFeito) tr.className = 'concluido'; 

                const tdProduto = `<td class="col-produto"><span class="nome-produto">${produto.nome}</span></td>`;

                let tdMeta = '<td class="col-meta">';
                if (metaAssar > 0) {
                    tdMeta += `<span class="qtd-meta">${metaAssar} un.</span> ➡️`;
                } else {
                    tdMeta += `<span class="texto-zero">-</span>`;
                }
                tdMeta += '</td>';

                let tdAcao = '<td class="col-acao">';
                if (metaAssar > 0) {
                    const textoBotao = statusFeito ? 'Desfazer' : 'Assado';
                    const classeBotao = statusFeito ? 'btn-acao desfazer' : 'btn-acao';
                    tdAcao += `<button class="${classeBotao}" onclick="marcarFeito(${produto.id})">${textoBotao}</button>`;
                } else {
                    tdAcao += `<span class="texto-zero">-</span>`; 
                }
                tdAcao += '</td>';

                let tdSeparar = '<td class="col-separar">';
                if (metaSeparar > 0) {
                    tdSeparar += `Separar: <strong>${metaSeparar} un.</strong>`;
                } else {
                    tdSeparar += `<span class="texto-zero">-</span>`;
                }
                tdSeparar += '</td>';

                tr.innerHTML = tdProduto + tdMeta + tdAcao + tdSeparar;
                container.appendChild(tr);
            });
        }

        function marcarFeito(produtoId) {
            checklist[turnoAtual][`id_${produtoId}`] = !checklist[turnoAtual][`id_${produtoId}`];
            renderizarTelas(); 
        }

        function resetarChecklist() {
            if (confirm("Deseja resetar o checklist da ação principal de hoje?")) {
                for (let key in checklist[turnoAtual]) {
                    checklist[turnoAtual][key] = false;
                }
                renderizarTelas();
            }
        }

        exibirData(); 
        verificarHorarioETurno(); 

        setInterval(() => {
            hoje = new Date(); 
            exibirData(); 
            verificarHorarioETurno(); 
        }, 60000);

    </script>
</body>
</html>
